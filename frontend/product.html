<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Product Details | AnthropicBots E-Commerce</title>

    <link rel="stylesheet" href="styles/style.css">

    <link rel="stylesheet" href="styles/product.css">

    <link
        rel="stylesheet"
        href="https://pro.fontawesome.com/releases/v5.10.0/css/all.css"
    >
</head>

<body>

    <div id="navbar"></div>

    <!-- Product Details -->

    <section id="product-details" class="section-p1">

        <!-- Product Images -->

        <div class="single-product-image">

            <img
                src=""
                width="100%"
                id="main-product-image"
                alt="Product"
            >

            <div class="small-image-group">

                <div class="small-image-col">

                    <img
                        src=""
                        class="small-image"
                        alt=""
                    >

                </div>

                <div class="small-image-col">

                    <img
                        src=""
                        class="small-image"
                        alt=""
                    >

                </div>

                <div class="small-image-col">

                    <img
                        src=""
                        class="small-image"
                        alt=""
                    >

                </div>

                <div class="small-image-col">

                    <img
                        src=""
                        class="small-image"
                        alt=""
                    >

                </div>

            </div>

        </div>

        <!-- Product Content -->

        <div class="single-product-details">

            <h6 id="product-category">

                Home / Product

            </h6>

            <h4 id="product-name">

                Product Name

            </h4>

            <h2 id="product-price">

                ₹0

            </h2>

            <!-- SIZE VARIANTS -->

            <div class="variant-section">
            
                <h4>Select Size</h4>
            
                <div class="size-options">
                
                    <button
                        class="size-btn active-size"
                        data-size="M"
                    >
                        M
                    </button>
                
                    <button
                        class="size-btn"
                        data-size="L"
                    >
                        L
                    </button>
                
                    <button
                        class="size-btn"
                        data-size="XL"
                    >
                        XL
                    </button>
                
                    <button
                        class="size-btn"
                        data-size="XXL"
                    >
                        XXL
                    </button>
                
                </div>
            
            </div>

            <!-- COLOR VARIANTS -->

            <div class="variant-section">
            
                <h4>Select Color</h4>
            
                <div class="color-options">
                
                    <button
                        class="color-btn active-color"
                        data-color="Black"
                        style="background:black;"
                    ></button>
                
                    <button
                        class="color-btn"
                        data-color="Blue"
                        style="background:blue;"
                    ></button>
                
                    <button
                        class="color-btn"
                        data-color="Red"
                        style="background:red;"
                    ></button>
                
                    <button
                        class="color-btn"
                        data-color="White"
                        style="background:white;border:1px solid #ccc;"
                    ></button>
                
                </div>
            
            </div>

            <!-- VARIANT STOCK -->

            <p class="variant-stock">
            
                Available Stock:
            
                <span id="variant-stock">
                
                    12
                
                </span>
            
            </p>

            <div class="quantity-box">

                <button id="minus-btn">

                    -

                </button>

                <input
                    type="number"
                    id="product-qty"
                    value="1"
                    min="1"
                >

                <button id="plus-btn">

                    +

                </button>

            </div>

            <div class="product-buttons">

                <button id="add-to-cart-btn">

                    Add To Cart

                </button>

                <button id="buy-now-btn">

                    Buy Now

                </button>

                <button id="wishlist-btn">

                    <i class="fas fa-heart"></i>

                    Wishlist

                </button>

            </div>

            <div class="product-meta">
                <p>
                    <strong>Brand:</strong>
                    <span id="product-brand">
                        Brand
                    </span>
                </p>
                <p>
                    <strong>Stock:</strong>
                    <span id="product-stock">
                        In Stock
                    </span>
                </p>
            </div>
            <h4>Product Details</h4>
            <span id="product-description">
                Product Description
            </span>

            <!-- Rating -->
            <div class="product-rating">
                <i class="fas fa-star"></i>
                <i class="fas fa-star"></i>
                <i class="fas fa-star"></i>
                <i class="fas fa-star"></i>
                <i class="fas fa-star-half-alt"></i>
                <span id="product-rating-text">
                    (4.5 Ratings)
                </span>
            </div>
        </div>
    </section>

    <!-- Reviews -->
    <section id="reviews" class="section-p1">
        <h2>Customer Reviews</h2>
        <!-- Review Form -->
        <form id="review-form">
            <input
                type="text"
                id="review-name"
                placeholder="Your Name"
                required
            >
            <select id="review-rating">
                <option value="5">
                    5 Stars
                </option>
                <option value="4">
                    4 Stars
                </option>
                <option value="3">
                    3 Stars
                </option>
                <option value="2">
                    2 Stars
                </option>
                <option value="1">
                    1 Star
                </option>
            </select>
            <textarea
                id="review-comment"
                placeholder="Write your review"
                required
            ></textarea>
            <button type="submit">
                Submit Review
            </button>
        </form>

        <!-- Dynamic Reviews -->
        <div
            class="review-container"
            id="review-container"
        ></div>
    </section>

    <!-- Related Products -->
    <section id="related-products" class="section-p1">
        <h2>Related Products</h2>
        <p>You may also like</p>
        <div
            class="pro-container"
            id="related-products-container"
        ></div>
    </section>

    <!-- Recommended Products -->
    <section id="recommended-products" class="section-p1">
        <h2>Recommended For You</h2>
        <p>
            Smart recommendations based on your interests
        </p>
        <div
            class="pro-container"
            id="recommended-products-container"
        ></div>
    </section>

    <div id="footer"></div>

    <!-- Firebase -->

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

    <script src="scripts/components.js"></script>

    <script src="scripts/auth.js"></script>

    <script src="scripts/product.js"></script>

</body>
</html>
